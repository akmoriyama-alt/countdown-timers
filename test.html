<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第35回 国家試験対策クイズ — 日本医専</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=IBM+Plex+Mono:wght@300;400;600&family=Noto+Sans+JP:wght@100;300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--w:#FAFAF8;--ink:#0A0A0A;--acc:#1A55A0;--grid:rgba(10,10,10,0.06);--rule:rgba(10,10,10,0.14);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--w);color:var(--ink);font-family:'Noto Sans JP', sans-serif;}

/* 背景 */
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:60px 60px;}
.bg-vignette{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse 80% 70% at 50% 50%,rgba(250,250,248,0.6) 0%,transparent 100%);}

.shell{position:relative;z-index:2;width:100vw;height:100vh;display:flex;flex-direction:column;}

/* ヘッダー */
.hd{display:flex;align-items:stretch;justify-content:space-between;opacity:0;animation:fadeY 0.5s ease forwards;flex-shrink:0;border-bottom:1px solid var(--rule);background:rgba(250,250,248,0.8);backdrop-filter:blur(10px);}
.hd-left{display:flex;align-items:center;padding:clamp(10px,2vh,30px) clamp(20px,4vw,60px);flex:1;}
.logo-block{display:flex;align-items:center;gap:25px;padding-right:40px;border-right:1px solid var(--rule);margin-right:40px;}
.logo-main{font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:2.2rem;letter-spacing:0.1em;color:var(--ink);white-space:nowrap;}
.logo-sub{font-family:"Oswald",sans-serif;font-size:1.1rem;letter-spacing:0.3em;color:var(--acc);margin-top:-4px;}
.hd-eyebrow{font-family:"IBM Plex Mono",monospace;font-weight:300;font-size:1rem;letter-spacing:0.25em;color:var(--acc);display:flex;align-items:center;gap:10px;}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--acc);animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.2;transform:scale(0.5);}}
.hd-title{font-family:"Oswald",sans-serif;font-weight:700;font-size:clamp(1.5rem,2.8vw,3.2rem);color:var(--ink);}

.hd-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:0 60px;border-left:1px solid var(--rule);min-width:280px;}
.live-clock{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:3.5rem;color:var(--acc);line-height:1;}

/* プログレスバー */
.progress-bar-wrap{height:6px;background:var(--rule);flex-shrink:0;}
.progress-bar-fill{height:100%;background:var(--acc);width:0%;transition:width 0s linear;}

/* クイズエリア */
.main-content{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 clamp(40px,8vw,120px);opacity:0;animation:fadeY 0.6s ease forwards 0.2s;}

.question-wrap{margin-bottom:60px;}
.meta-label{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:1.2rem;letter-spacing:0.4em;color:var(--acc);text-transform:uppercase;margin-bottom:20px;}
.question-text{font-size:clamp(2.5rem,4vw,4.5rem);font-weight:500;line-height:1.45;color:var(--ink);}

.answer-box{
  background:white;border-left:15px solid var(--acc);padding:60px;
  opacity:0;transform:translateY(40px);transition:all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow:0 30px 80px rgba(0,0,0,0.08);
}
.answer-box.show{opacity:1;transform:translateY(0);}
.answer-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px;}
.answer-name{font-size:clamp(4rem,6vw,6.5rem);font-weight:700;color:var(--acc);line-height:1;}
.meridian-name{font-size:1.8rem;font-weight:500;color:rgba(10,10,10,0.4);letter-spacing:0.1em;}
.answer-desc{font-size:1.8rem;color:rgba(10,10,10,0.7);line-height:1.8;font-weight:300;max-width:1200px;}

.tag-container{margin-top:30px;display:flex;gap:15px;}
.effect-tag{background:rgba(26,85,160,0.08);padding:8px 20px;border-radius:6px;font-size:1.2rem;color:var(--acc);font-weight:600;}

.card-fade{transition:opacity 0.4s ease;}
.card-fade.out{opacity:0;}
@keyframes fadeY{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-vignette"></div>
<div class="shell">
  <header class="hd">
    <div class="hd-left">
      <div class="logo-block">
        <div><div class="logo-main">日本医専</div><div class="logo-sub">NIHON ISEN</div></div>
      </div>
      <div>
        <div class="hd-eyebrow"><span class="pulse"></span>NATIONAL EXAM PREP</div>
        <div class="hd-title">鍼灸師国家試験対策 一問一答</div>
      </div>
    </div>
    <div class="hd-right"><div class="live-clock" id="live-clock">00:00:00</div></div>
  </header>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>
  
  <main class="main-content card-fade" id="quiz-container">
    <div class="question-wrap">
      <div class="meta-label">QUESTION</div>
      <div class="question-text" id="q-text">—</div>
    </div>

    <div id="answer-area" class="answer-box">
      <div class="meta-label">ANSWER</div>
      <div class="answer-header">
        <div class="answer-name" id="a-name">—</div>
        <div class="meridian-name" id="meridian-text">—</div>
      </div>
      <div class="answer-desc" id="a-desc">—</div>
      <div class="tag-container" id="a-tags"></div>
    </div>
  </main>
</div>

<script>
function updateClock(){
  const now=new Date();
  const f=n=>String(n).padStart(2,'0');
  document.getElementById('live-clock').textContent=`${f(now.getHours())}:${f(now.getMinutes())}:${f(now.getSeconds())}`;
}
setInterval(updateClock,1000);updateClock();

const QUIZ_DATA = [
  {
    q: "第2中手骨橈側の中点に取穴する経穴は？",
    a: "合谷 (LI4)",
    meridian: "手の陽明大腸経",
    desc: "大腸経の原穴。面目の疾患に用いる四総穴の一つとして最頻出。第35回試験でも必須の重要穴です。",
    tags: ["原穴", "四総穴", "顔面の疾患"]
  },
  {
    q: "足の陽明胃経の合土穴で、下合穴（胃）としても知られる経穴は？",
    a: "足三里 (ST36)",
    meridian: "足の陽明胃経",
    desc: "犢鼻から下3寸。腹部の疾患に対応する四総穴であり、臨床的にも教育的にも極めて重要です。",
    tags: ["合土穴", "下合穴", "四総穴"]
  },
  {
    q: "第3胸椎棘突起下外方1.5寸に位置する経穴は？",
    a: "肺兪 (BL13)",
    meridian: "足の太陽膀胱経",
    desc: "肺の背部兪穴。椎骨の高さ（T3）と取穴部位の組み合わせを確実に暗記しましょう。",
    tags: ["背部兪穴", "第3胸椎", "呼吸器"]
  },
  {
    q: "第1・第2中足骨底間の前方陥凹部に取穴する経穴は？",
    a: "太衝 (LR3)",
    meridian: "足の厥陰肝経",
    desc: "肝経の原穴・輸土穴。胃経の「衝陽」との部位や名称の混同に注意しましょう。",
    tags: ["原穴", "輸土穴", "肝経"]
  }
];

const INTERVAL = 14000; 
let idx = 0;

function render(n) {
  const d = QUIZ_DATA[n];
  const container = document.getElementById('quiz-container');
  const ansArea = document.getElementById('answer-area');
  
  container.classList.add('out');
  ansArea.classList.remove('show');

  setTimeout(() => {
    document.getElementById('q-text').textContent = d.q;
    document.getElementById('a-name').textContent = d.a;
    document.getElementById('meridian-text').textContent = d.meridian;
    document.getElementById('a-desc').textContent = d.desc;
    document.getElementById('a-tags').innerHTML = d.tags.map(t=>`<span class="effect-tag">${t}</span>`).join('');
    
    container.classList.remove('out');

    const bar = document.getElementById('progress-bar');
    bar.style.transition = 'none'; bar.style.width = '0%';
    setTimeout(() => {
      bar.style.transition = `width ${INTERVAL}ms linear`;
      bar.style.width = '100%';
    }, 50);

    // 7秒後に解答を表示
    setTimeout(() => {
      if (document.getElementById('q-text').textContent === d.q) {
        ansArea.classList.add('show');
      }
    }, INTERVAL / 2);
  }, 400);
}

render(Math.floor(Math.random() * QUIZ_DATA.length));
setInterval(() => {
  idx = (idx + 1) % QUIZ_DATA.length;
  render(idx);
}, INTERVAL);
</script>
</body>
</html>
