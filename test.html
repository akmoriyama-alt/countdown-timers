<style>
:root{--w:#FAFAF8;--ink:#0A0A0A;--acc:#1A55A0;--柔整:#D32F2F;--鍼灸:#2E7D32;--共通:#EF6C00;--grid:rgba(10,10,10,0.06);--rule:rgba(10,10,10,0.14);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--w);color:var(--ink);font-family:'Noto Sans JP', sans-serif;}

/* 背景デザイン */
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:60px 60px;}
.bg-vignette{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse 80% 70% at 50% 50%,rgba(250,250,248,0.6) 0%,transparent 100%);}

.shell{position:relative;z-index:2;width:100vw;height:100vh;display:flex;flex-direction:column;}

/* ヘッダー修正：サイネージ用に高さを確保 */
.hd{
  display:flex;
  align-items:center;
  justify-content:space-between;
  height: 15vh;
  opacity:0;
  animation:fadeY 0.5s ease forwards;
  flex-shrink:0;
  border-bottom:1px solid var(--rule);
  background:rgba(250,250,248,0.8);
  backdrop-filter:blur(10px);
  padding: 0 40px;
}

.hd-left{display:flex;align-items:center;gap:30px;flex:0 1 auto;}

/* ロゴのサイズを適切に制限 */
.logo-block{
  display:flex;
  align-items:center;
  gap:15px;
  flex-shrink:0;
  border-right:1px solid var(--rule);
  padding-right:30px;
}

.logo-main{
  font-family:"Noto Sans JP",sans-serif;
  font-weight:700;
  font-size:2rem;
  letter-spacing:0.1em;
  color:var(--ink);
  white-space:nowrap;
  line-height:1.2;
}

.logo-sub{
  font-family:"Oswald",sans-serif;
  font-size:0.95rem;
  letter-spacing:0.2em;
  color:var(--acc);
  line-height:1;
}

.hd-eyebrow{font-family:"IBM Plex Mono",monospace;font-weight:300;font-size:0.85rem;letter-spacing:0.2em;color:var(--acc);display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.2;transform:scale(0.5);}}

.hd-title{font-family:"Oswald",sans-serif;font-weight:700;font-size:1.7rem;color:var(--ink);line-height:1.2;}

.hd-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;flex-shrink:0;border-left:1px solid var(--rule);padding-left:30px;min-width:auto;}

.live-clock{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:2.5rem;color:var(--acc);line-height:1;}

/* プログレスバー */
.progress-bar-wrap{height:6px;background:var(--rule);flex-shrink:0;}
.progress-bar-fill{height:100%;background:var(--acc);width:0%;transition:width 0s linear;}

/* メインコンテンツ（クイズエリア）を広く取る */
.main-content{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 8%;opacity:0;animation:fadeY 0.6s ease forwards 0.2s;}

.question-wrap{margin-bottom:40px;}
.meta-label{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:1rem;letter-spacing:0.4em;color:var(--acc);text-transform:uppercase;margin-bottom:15px;}
.question-text{font-size:clamp(1.8rem, 3.5vw, 4rem);font-weight:500;line-height:1.4;color:var(--ink);}

.answer-box{
  background:white;border-left:15px solid var(--acc);padding:40px 60px;
  opacity:0;transform:translateY(40px);transition:all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow:0 30px 80px rgba(0,0,0,0.08);
}
.answer-box.show{opacity:1;transform:translateY(0);}
.answer-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:15px;}
.answer-name{font-size:clamp(2.5rem, 4.5vw, 5.5rem);font-weight:700;color:var(--acc);line-height:1.1;}
.category-badge{padding:6px 14px;border-radius:4px;font-size:1rem;font-weight:700;color:white;white-space:nowrap;}
.answer-desc{font-size:1.6rem;color:rgba(10,10,10,0.7);line-height:1.7;font-weight:300;max-width:1100px;}

.tag-container{margin-top:25px;display:flex;gap:12px;flex-wrap:wrap;}
.effect-tag{background:rgba(10,10,10,0.05);padding:6px 16px;border-radius:6px;font-size:1.1rem;color:var(--ink);font-weight:600;}

.card-fade{transition:opacity 0.4s ease;}
.card-fade.out{opacity:0;}
@keyframes fadeY{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

  const themeColor = typeColors[d.type] || "var(--acc)";

  setTimeout(() => {
    document.getElementById('q-text').textContent = d.q;
    document.getElementById('a-name').textContent = d.a;
    document.getElementById('a-name').style.color = themeColor;
    
    badge.textContent = `${d.type} | ${d.cat}`;
    badge.style.backgroundColor = themeColor;
    
    document.getElementById('a-desc').textContent = d.desc;
    document.getElementById('a-tags').innerHTML = d.tags.map(t=>`<span class="effect-tag">${t}</span>`).join('');
    
    bar.style.backgroundColor = themeColor;
    container.classList.remove('out');

    bar.style.transition = 'none'; bar.style.width = '0%';
    setTimeout(() => {
      bar.style.transition = `width ${INTERVAL}ms linear`;
      bar.style.width = '100%';
    }, 50);

    setTimeout(() => {
      if (document.getElementById('q-text').textContent === d.q) {
        ansArea.classList.add('show');
      }
    }, INTERVAL / 2);
  }, 400);
}

QUIZ_DATA.sort(() => Math.random() - 0.5);
render(0);

setInterval(() => {
  idx = (idx + 1) % QUIZ_DATA.length;
  render(idx);
}, INTERVAL);
</script>
</body>
</html>
