<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鍼灸師国家試験 カウントダウン</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #C0292B;
            --red-light: #E03A3C;
            --red-dim: rgba(192,41,43,0.08);
            --gold: #8A6E22;
            --gold-light: #B89440;
            --deep: #ffffff;
            --text: #0A0A0F;
            --muted: #888480;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--deep);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(80px); }
        }

        .bg-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(192,41,43,0.04) 0%, transparent 70%);
        }

        .top-bar, .bottom-bar {
            position: absolute;
            left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, transparent, var(--red), var(--red-light), var(--red), transparent);
        }
        .top-bar { top: 0; }
        .bottom-bar { bottom: 0; }

        .corner {
            position: absolute;
            width: 50px; height: 50px;
            border-color: var(--red);
            border-style: solid;
            opacity: 0.7;
        }
        .corner-tl { top: 24px; left: 24px; border-width: 2px 0 0 2px; }
        .corner-tr { top: 24px; right: 24px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: 24px; left: 24px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: 24px; right: 24px; border-width: 0 2px 2px 0; }

        .scanlines {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 3px,
                rgba(0,0,0,0.02) 3px, rgba(0,0,0,0.02) 4px
            );
            pointer-events: none;
            z-index: 5;
        }

        .logo {
            position: absolute;
            top: 32px; right: 50px;
            width: 140px;
            background: #ffffff;
            z-index: 10;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1800px;
            padding: 20px 60px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .eyebrow {
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.6rem, 0.8vw, 0.75rem);
            letter-spacing: 6px;
            color: var(--red);
            margin-bottom: 8px;
            animation: fadeUp 0.8s ease-out both;
        }
        .pulse-dot {
            display: inline-block;
            width: 7px; height: 7px;
            background: var(--red);
            border-radius: 50%;
            margin-right: 10px;
            animation: pulseDot 1s ease-in-out infinite;
            vertical-align: middle;
        }
        @keyframes pulseDot {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.6); }
        }

        .title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.8rem, 4.5vw, 5rem);
            letter-spacing: 16px;
            color: var(--text);
            line-height: 1;
            margin-bottom: 4px;
            animation: fadeUp 0.8s ease-out 0.1s both;
        }

        .subtitle {
            font-size: clamp(0.75rem, 1.1vw, 1rem);
            font-weight: 300;
            color: var(--muted);
            letter-spacing: 4px;
            animation: fadeUp 0.8s ease-out 0.2s both;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 12px auto;
            width: 500px;
            max-width: 90%;
            animation: fadeUp 0.8s ease-out 0.25s both;
        }
        .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--red)); }
        .divider-line.r { background: linear-gradient(90deg, var(--red), transparent); }
        .divider-diamond { width: 7px; height: 7px; background: var(--red); transform: rotate(45deg); flex-shrink: 0; }

        /* Exam date */
        .exam-date-wrap {
            margin-bottom: 18px;
            animation: fadeUp 0.8s ease-out 0.3s both;
        }
        .exam-date {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.75rem, 1.1vw, 1rem);
            letter-spacing: 4px;
            color: #ffffff;
            background: var(--red);
            padding: 8px 32px;
            clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
        }

        /* Countdown grid */
        .countdown {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
            animation: fadeUp 0.8s ease-out 0.4s both;
        }

        .time-block {
            flex: 1;
            max-width: 340px;
            position: relative;
            padding: 20px 16px 16px;
            border: 1px solid rgba(192,41,43,0.18);
            background: rgba(0,0,0,0.02);
            transition: background 0.3s, border-color 0.3s;
        }
        .time-block + .time-block { border-left: none; }
        .time-block::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(192,41,43,0.04) 0%, transparent 60%);
        }
        .time-block:hover {
            background: rgba(192,41,43,0.05);
            border-color: rgba(192,41,43,0.4);
        }

        .time-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(7rem, 15vw, 15rem);
            line-height: 0.88;
            color: var(--text);
            letter-spacing: -4px;
            display: block;
            text-shadow: 0 3px 0 rgba(0,0,0,0.1);
            transition: color 0.2s, text-shadow 0.2s;
        }
        .time-block:hover .time-number {
            color: var(--red);
            text-shadow: 0 3px 0 rgba(0,0,0,0.08);
        }

        .time-unit-bar {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--red), transparent);
            margin: 10px auto 9px;
            width: 60%;
        }

        .time-label {
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.55rem, 0.8vw, 0.75rem);
            letter-spacing: 5px;
            color: var(--red);
        }

        .flash-anim {
            animation: flashRed 0.35s ease-out;
        }
        @keyframes flashRed {
            0% { color: var(--red); text-shadow: 0 0 30px rgba(192,41,43,0.4); }
            100% { color: var(--text); text-shadow: 0 3px 0 rgba(0,0,0,0.1); }
        }

        /* Message */
        .message {
            font-size: clamp(0.8rem, 1.2vw, 1.05rem);
            font-weight: 300;
            color: var(--muted);
            letter-spacing: 6px;
            animation: fadeUp 0.8s ease-out 0.5s both;
        }

        .celebration {
            display: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 12px;
            color: var(--red);
        }

        /* Bottom bar */
        .bottom-row {
            position: absolute;
            bottom: 32px;
            left: 55px; right: 55px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 2;
        }
        .bottom-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: rgba(192,41,43,0.45);
            text-transform: uppercase;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .container { padding: 30px 20px; }
            .time-block { padding: 20px 10px 16px; }
        }
        @media (max-width: 600px) {
            .countdown { flex-wrap: wrap; }
            .time-block { min-width: 45%; flex: none; }
            .time-block:nth-child(2) { border-left: none; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="scanlines"></div>
    <div class="top-bar"></div>
    <div class="bottom-bar"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <img src="https://page.gensparksite.com/v1/base64_upload/49a84d050fca839f6863a744eccb25f2" alt="Nihon Isen" class="logo">

    <div class="container">
        <div class="eyebrow">
            <span class="pulse-dot"></span>
            NATIONAL EXAMINATION COUNTDOWN
        </div>
        <h1 class="title">鍼灸師国家試験</h1>
        <p class="subtitle">第35回 はり師・きゅう師 国家試験</p>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-diamond"></div>
            <div class="divider-line r"></div>
        </div>

        <div class="exam-date-wrap">
            <div class="exam-date">試験日（仮）&nbsp;&nbsp;2027年 2月 21日（日）</div>
        </div>

        <div class="countdown" id="countdown">
            <div class="time-block">
                <span class="time-number" id="days">000</span>
                <div class="time-unit-bar"></div>
                <div class="time-label">DAYS &nbsp;／&nbsp; 日</div>
            </div>
            <div class="time-block">
                <span class="time-number" id="hours">00</span>
                <div class="time-unit-bar"></div>
                <div class="time-label">HOURS &nbsp;／&nbsp; 時間</div>
            </div>
            <div class="time-block">
                <span class="time-number" id="minutes">00</span>
                <div class="time-unit-bar"></div>
                <div class="time-label">MINUTES &nbsp;／&nbsp; 分</div>
            </div>
            <div class="time-block">
                <span class="time-number" id="seconds">00</span>
                <div class="time-unit-bar"></div>
                <div class="time-label">SECONDS &nbsp;／&nbsp; 秒</div>
            </div>
        </div>

        <div class="message" id="message">目標達成まで　一歩ずつ前進しましょう</div>
        <div class="celebration" id="celebration">試験当日　—　これまでの努力を信じて　—</div>
    </div>

    <div class="bottom-row">
        <span class="bottom-text" id="live-clock"></span>
        <span class="bottom-text">NIHON ISEN COLLEGE OF ACUPUNCTURE</span>
        <span class="bottom-text" id="live-date"></span>
    </div>

    <script>
        const examDate = new Date('2027-02-21T09:00:00').getTime();
        const pad = (n, l = 2) => String(n).padStart(l, '0');
        let prev = {};

        function flash(id) {
            const el = document.getElementById(id);
            el.classList.remove('flash-anim');
            void el.offsetWidth;
            el.classList.add('flash-anim');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').textContent =
                `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            document.getElementById('live-date').textContent =
                `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`;
        }

        function update() {
            const dist = examDate - Date.now();
            const d = Math.max(0, Math.floor(dist / 86400000));
            const h = Math.max(0, Math.floor((dist % 86400000) / 3600000));
            const m = Math.max(0, Math.floor((dist % 3600000) / 60000));
            const s = Math.max(0, Math.floor((dist % 60000) / 1000));

            const vals = { days: pad(d, 3), hours: pad(h), minutes: pad(m), seconds: pad(s) };
            for (const k in vals) {
                if (prev[k] !== vals[k]) {
                    if (prev[k] !== undefined) flash(k);
                    document.getElementById(k).textContent = vals[k];
                    prev[k] = vals[k];
                }
            }

            const msg = document.getElementById('message');
            const cel = document.getElementById('celebration');
            if (dist < 0) {
                document.getElementById('countdown').style.display = 'none';
                cel.style.display = 'block';
                msg.style.display = 'none';
            } else if (d === 0) {
                msg.textContent = '試験当日です　— 落ち着いて全力を尽くしてください —';
            } else if (d <= 7) {
                msg.textContent = '最終調整の時期です　— 体調管理を最優先に —';
            } else if (d <= 30) {
                msg.textContent = '仕上げの段階です　— 重要ポイントを丁寧に確認を —';
            } else if (d <= 100) {
                msg.textContent = '本格的な対策期間です　— 計画的に学習を進めましょう —';
            } else {
                msg.textContent = '目標達成まで　一歩ずつ前進しましょう';
            }
        }

        update(); updateClock();
        setInterval(update, 1000);
        setInterval(updateClock, 1000);

        document.addEventListener('click', () => {
            document.documentElement.requestFullscreen?.().catch(() => {});
        }, { once: true });

        document.addEventListener('keydown', e => {
            if (e.key === 'F11') {
                e.preventDefault();
                if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
                else document.exitFullscreen?.();
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) update();
        });
    </script>
</body>
</html>
