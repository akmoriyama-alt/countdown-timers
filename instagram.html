<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Video Signage - nihonisen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 0;
            padding: 0;
            background: #000;
        }

        .video-wrapper {
            width: 640px;
            height: 1080px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        .video-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        @media (max-width: 1920px) {
            body {
                width: 100%;
                height: 100%;
            }

            .video-wrapper {
                width: calc(100% / 3);
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <!-- Videos will be loaded automatically -->
    </div>

    <script>
        const INSTAGRAM_USERNAME = 'nihonisen';
        const NUM_VIDEOS = 3;
        const CONTAINER = document.getElementById('container');
        const CACHE_KEY = 'instagram_posts_cache';
        const CACHE_DURATION = 5 * 60 * 1000; // 5分

        // キャッシュからデータを取得
        function getFromCache() {
            try {
                const cached = sessionStorage.getItem(CACHE_KEY);
                if (!cached) return null;

                const { data, timestamp } = JSON.parse(cached);
                if (Date.now() - timestamp > CACHE_DURATION) {
                    sessionStorage.removeItem(CACHE_KEY);
                    return null;
                }

                return data;
            } catch (error) {
                console.error('Cache error:', error);
                return null;
            }
        }

        // キャッシュにデータを保存
        function setCache(data) {
            try {
                sessionStorage.setItem(CACHE_KEY, JSON.stringify({
                    data,
                    timestamp: Date.now()
                }));
            } catch (error) {
                console.error('Cache save error:', error);
            }
        }

        // Instagram投稿を自動取得
        async function fetchInstagramPostsFast() {
            // まずキャッシュをチェック
            const cached = getFromCache();
            if (cached && cached.length > 0) {
                renderVideos(cached.slice(0, NUM_VIDEOS));
                // バックグラウンドで更新
                fetchFromInstagramProfile();
                return;
            }

            // キャッシュなし → 取得開始
            await fetchFromInstagramProfile();
        }

        // Instagram プロフィールページから投稿IDを抽出
        async function fetchFromInstagramProfile() {
            try {
                // プロフィールページをHTMLで取得
                const response = await fetch(
                    `https://www.instagram.com/${INSTAGRAM_USERNAME}/`,
                    {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
                        }
                    }
                );

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const html = await response.text();
                const posts = extractPostsFromHTML(html);

                if (posts.length > 0) {
                    setCache(posts);
                    renderVideos(posts.slice(0, NUM_VIDEOS));
                } else {
                    throw new Error('No posts found in HTML');
                }
            } catch (error) {
                console.error('HTML extraction failed, trying alternative method:', error);
                await fetchFromInstagramGraphQL();
            }
        }

        // HTMLから投稿IDを抽出
        function extractPostsFromHTML(html) {
            try {
                // window.__data を探す
                const match = html.match(/window\._sharedData\s*=\s*({.*?});<\/script>/);
                if (match) {
                    const data = JSON.parse(match[1]);
                    const posts = extractPostsFromData(data);
                    if (posts.length > 0) return posts;
                }

                // 代替：shortcodeパターンで検索
                const shortcodeRegex = /\/(?:p|reel)\/([A-Za-z0-9_-]{11})/g;
                const postIds = [];
                let result;
                while ((result = shortcodeRegex.exec(html)) !== null) {
                    if (postIds.indexOf(result[1]) === -1) {
                        postIds.push(result[1]);
                    }
                    if (postIds.length >= 20) break;
                }

                return postIds;
            } catch (error) {
                console.error('HTML extraction error:', error);
                return [];
            }
        }

        // データから投稿を抽出
        function extractPostsFromData(data) {
            try {
                const edges = data?.entry_data?.ProfilePage?.[0]?.graphql?.user?.edge_owner_to_timeline_media?.edges || [];
                return edges
                    .filter(edge => {
                        const node = edge?.node;
                        return node && (node.is_video === true);
                    })
                    .map(edge => edge.node.shortcode)
                    .filter(Boolean);
            } catch (error) {
                console.error('Data extraction error:', error);
                return [];
            }
        }

        // GraphQL での取得（代替方法）
        async function fetchFromInstagramGraphQL() {
            try {
                const response = await fetch(
                    `https://www.instagram.com/api/v1/users/web_profile_info/?username=${INSTAGRAM_USERNAME}`,
                    {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (iPhone; CPU iPhone OS 14_6 like Mac OS X) AppleWebKit/605.1.15'
                        }
                    }
                );

                if (!response.ok) {
                    throw new Error('GraphQL fetch failed');
                }

                const data = await response.json();
                const posts = extractPostsFromGraphQL(data);

                if (posts.length > 0) {
                    setCache(posts);
                    renderVideos(posts.slice(0, NUM_VIDEOS));
                }
            } catch (error) {
                console.error('GraphQL method failed:', error);
                // フォールバック：埋め込み表示のみ（投稿IDなし）
                showFallbackMessage();
            }
        }

        // GraphQL データから投稿を抽出
        function extractPostsFromGraphQL(data) {
            try {
                const user = data?.user;
                if (!user) return [];

                const edges = user?.edge_owner_to_timeline_media?.edges || [];
                return edges
                    .filter(edge => {
                        const node = edge?.node;
                        return node && (node.is_video === true);
                    })
                    .map(edge => edge.node.shortcode)
                    .filter(Boolean);
            } catch (error) {
                console.error('GraphQL extraction error:', error);
                return [];
            }
        }

        // ビデオをレンダリング
        function renderVideos(postIds) {
            CONTAINER.innerHTML = '';

            postIds.forEach((postId, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'video-wrapper';

                const videoContainer = document.createElement('div');
                videoContainer.className = 'video-container';

                const iframe = document.createElement('iframe');
                iframe.src = `https://www.instagram.com/reel/${postId}/embed/?hidecaption=true`;
                iframe.width = '640';
                iframe.height = '1080';
                iframe.setAttribute('frameborder', '0');
                iframe.setAttribute('scrolling', 'no');
                iframe.setAttribute('allowtransparency', 'true');
                iframe.setAttribute('allow', 'encrypted-media');
                
                // 遅延読み込み
                iframe.setAttribute('loading', 'lazy');

                videoContainer.appendChild(iframe);
                wrapper.appendChild(videoContainer);
                CONTAINER.appendChild(wrapper);
            });

            // Instagram埋め込みスクリプトを実行
            if (window.instgrm) {
                window.instgrm.Embeds.process();
            }
        }

        // フォールバックメッセージ
        function showFallbackMessage() {
            CONTAINER.innerHTML = `
                <div style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; color: #888; font-size: 16px;">
                    <div style="text-align: center;">
                        <p>Instagram投稿を取得しています...</p>
                        <p style="font-size: 12px; margin-top: 20px;">ページをリロードしてください</p>
                    </div>
                </div>
            `;
            // リトライ
            setTimeout(fetchInstagramPostsFast, 3000);
        }

        // ページロード時に実行
        window.addEventListener('load', function() {
            fetchInstagramPostsFast();

            // 5分ごとにバックグラウンド更新
            setInterval(() => {
                fetchFromInstagramProfile();
            }, 5 * 60 * 1000);
        });
    </script>

    <!-- Instagram Embed Script -->
    <script async src="https://www.instagram.com/embed.js"></script>
</body>
</html>
