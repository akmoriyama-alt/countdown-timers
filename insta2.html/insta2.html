<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>NIHONISEN | Innovation Signage</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;600&family=Noto+Sans+JP:wght@100;300;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden; background: #ffffff;
      color: #000; font-family: 'Outfit', 'Noto Sans JP', sans-serif;
      cursor: none;
    }
    body::before {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(at 80% 15%, rgba(240, 240, 255, 0.6) 0%, transparent 40%), linear-gradient(135deg, #ffffff 0%, #fcfcfd 100%);
      z-index: -1;
    }
    #main-container { display: flex; width: 100%; height: 100%; align-items: center; flex-direction: row-reverse; }
    #video-side { flex: 0 0 55%; height: 100%; display: flex; align-items: center; justify-content: center; padding-left: 40px; padding-right: 60px; }
    .viewport {
      width: 520px; height: 924px;
      background: #000; border-radius: 50px;
      box-shadow: 0 60px 120px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    video { width: 100%; height: 100%; object-fit: cover; }
    #info-side { flex: 0 0 45%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding-left: 60px; padding-right: 40px; position: relative; }
    #logo { width: 640px; height: auto; margin-bottom: 25px; }
    #status-bar { margin-top: 40px; }
    #clock { font-size: 130px; font-weight: 100; line-height: 0.8; letter-spacing: -0.05em; }
    #date-text { font-size: 26px; font-weight: 300; color: #888; }
  </style>
</head>
<body>

<div id="main-container">
  <section id="video-side">
    <div class="viewport">
      <video id="player" muted playsinline autoplay>
        <source src="video1.mp4" type="video/mp4">
        <source src="video1.MP4" type="video/mp4">
      </video>
    </div>
  </section>

  <section id="info-side">
    <div class="brand-box">
      <img src="logo.jpg" alt="NIHONISEN" id="logo">
    </div>
    <div id="status-bar">
      <div id="clock">00:00</div>
      <div id="date-text">2026.04.22</div>
    </div>
  </section>
</div>

<script>
  function updateTime() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', hour12: false });
    document.getElementById('date-text').textContent = now.toLocaleDateString('ja-JP').replace(/\//g, '.');
  }
  setInterval(updateTime, 1000);
  updateTime();

  // 複数動画の再生管理
  const player = document.getElementById('player');
  const videos = ['video1', 'video2', 'video3'];
  let currentVideoIndex = 0;
  let availableVideos = [];

  // 動画の存在確認と再生キューの構築
  async function checkAndBuildPlaylist() {
    for (const video of videos) {
      const extensions = ['.mp4', '.MP4'];
      let found = false;

      for (const ext of extensions) {
        try {
          const response = await fetch(video + ext, { method: 'HEAD' });
          if (response.ok) {
            availableVideos.push(video + ext);
            found = true;
            break;
          }
        } catch (e) {
          // ファイルが見つからない場合は次の拡張子をチェック
        }
      }

      if (!found) {
        console.log(`${video} は見つかりません`);
      }
    }

    // 利用可能な動画がない場合のフォールバック
    if (availableVideos.length === 0) {
      availableVideos = ['video1.mp4'];
    }

    console.log('再生キュー:', availableVideos);
    playNextVideo();
  }

  // 次の動画を再生
  function playNextVideo() {
    if (availableVideos.length === 0) return;

    const videoSrc = availableVideos[currentVideoIndex];
    player.src = videoSrc;
    player.load();
    player.play();

    // 次のビデオインデックスを更新（ループ）
    currentVideoIndex = (currentVideoIndex + 1) % availableVideos.length;
  }

  // 動画終了時に次を再生
  player.addEventListener('ended', playNextVideo);

  // 自動再生が制限された場合の対策（クリックで再生開始）
  window.addEventListener('mousedown', () => {
    if (player.paused) player.play();
  });

  // 初期化開始
  checkAndBuildPlaylist();
</script>
</body>
</html>
