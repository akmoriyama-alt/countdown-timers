<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>日本医専 ニュース配信</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; background: #f5f5f5; }
        .container { display: flex; flex-direction: column; width: 100%; height: 100%; }
        .header { background: white; padding: 20px 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ddd; height: 120px; }
        .logo-img { height: 80px; width: auto; object-fit: contain; }
        .time-box { text-align: right; }
        .time-display { font-size: 56px; font-weight: bold; color: #000; font-family: 'Courier New', monospace; }
        .time-label { font-size: 14px; color: #999; margin-top: 5px; }
        .content { display: flex; flex: 1; padding: 40px 60px; gap: 35px; }
        .image-section { flex: 0 0 48%; background: #f0f0f0; border-radius: 10px; overflow: hidden; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .image-section img { display: block; width: 100%; height: 100%; object-fit: contain; }
        .text-section { flex: 1; background: white; padding: 40px 35px; border-radius: 10px; overflow-y: auto; border: 2px solid #ddd; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 3px solid #ddd; padding-bottom: 15px; }
        .tab { padding: 10px 20px; background: #f0f0f0; border: none; cursor: default; font-size: 15px; font-weight: 600; border-radius: 4px; }
        .tab.active { background: #003d6b; color: white; }
        .news-meta { display: flex; gap: 15px; margin-bottom: 20px; font-size: 14px; }
        .news-date { color: #666; font-weight: 500; }
        .news-category { background: #e8f2ff; color: #003d6b; padding: 5px 14px; border-radius: 4px; font-weight: 600; font-size: 13px; }
        .news-title { font-size: 28px; font-weight: bold; margin-bottom: 22px; color: #000; line-height: 1.4; }
        .news-text { font-size: 17px; color: #333; line-height: 2.0; white-space: pre-line; letter-spacing: 0.5px; }
    </style>
</head>

            text: '高校生向けの実技体験付きオープンキャンパスを開催いたします。\n「【高校生向け】実技体験付きオープンキャンパス」では接骨院の仕事について学べます。\n「日本鍼灸」×「中国鍼灸」では、両方の手技について体験できます。\n「社会人のための説明会」も同時開催いたします。\nご参加お待ちしております！',

        {

            title: '288名が医療の道へ',
            text: '【2026年度入学式】\n2026年4月、新たに288名の学生が日本医専に入学いたしました。\n柔道整復学科と鍼灸学科の両学科に、多くの志を持った学生が集まりました。\nこれからの3年間で、医療のプロフェッショナルへと成長していきます。\n皆様の応援よろしくお願いいたします！',

            newsDate: '2026.04.01',

            category: 'ニュース',
            title: '【4/12(日)オープンキャンパス開催】',
            text: '統合医療で不調を改善するオープンキャンパスを開催いたします。\n「統合医療で不調を改善～婦人鍼灸×美ボディ鍼～」のテーマで実技体験を行います。\n女性向けの実用的な鍼灸技術について学ぶことができます。\n美容と健康の両面からのアプローチを体験いただけます。\nぜひご参加ください！',

    let currentIndex = 0;
    
    // 今日の日付
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    // イベント日付を基準にフィルタリング
    const futureNews = newsData.filter(news => {
        // イベント日付がある場合はそれを基準、ない場合は記事日付を基準
        const dateToCheck = news.eventDate ? new Date(news.eventDate.replace(/\./g, '-')) : new Date(news.newsDate.replace(/\./g, '-'));
        dateToCheck.setHours(0, 0, 0, 0);
        return dateToCheck >= today;
    });
    
    const displayData = futureNews.length > 0 ? futureNews : newsData;

    function displayNews(index) {
        const news = displayData[index % displayData.length];
        document.getElementById('newsDate').textContent = news.newsDate;
        document.getElementById('newsCategory').textContent = news.category;
        document.getElementById('newsTitle').textContent = news.title;
        document.getElementById('newsText').textContent = news.text;
        document.getElementById('newsImage').src = news.imageUrl;
    }

    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('clockDisplay').textContent = h + ':' + m + ':' + s;
    }

    window.addEventListener('load', function() {
        displayNews(0);
        updateClock();
        setInterval(updateClock, 1000);
        setInterval(function() {
            currentIndex++;
            displayNews(currentIndex);
        }, 8000);
    });
