<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柔道整復師国家試験 カウントダウン</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=IBM+Plex+Mono:wght@300;400;600&family=Noto+Sans+JP:wght@100;300&display=swap" rel="stylesheet">
<style>
:root {
  --w: #FAFAF8;
  --ink: #0A0A0A;
  --acc: #1A55A0;
  --acc2: #2870CC;
  --grid: rgba(10,10,10,0.06);
  --rule: rgba(10,10,10,0.14);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--w);color:var(--ink);}

/* ── precision grid background ── */
.bg-grid{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 60px 60px;
}
/* subtle radial fade to pure white at center */
.bg-vignette{
  position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse 80% 70% at 50% 50%, rgba(250,250,248,0.6) 0%, transparent 100%);
}

/* ── layout ── */
.shell{
  position:relative;z-index:2;
  width:100vw;height:100vh;
  display:grid;
  grid-template-rows: auto 1fr auto;
}

/* ══ HEADER ══ */
.hd{
  display:flex;align-items:stretch;justify-content:space-between;
  
  opacity:0;animation:fadeY 0.5s ease forwards 0s;
}
.hd-left{
  display:flex;flex-direction:column;justify-content:center;
  padding: clamp(16px,2.8vh,36px) clamp(28px,4vw,64px);
  border-right:1px solid var(--rule);
  flex:1;
}
.hd-eyebrow{
  font-family:'IBM Plex Mono',monospace;font-weight:300;
  font-size:clamp(0.9rem,1.4vw,1.4rem);letter-spacing:0.22em;
  color:var(--acc);display:flex;align-items:center;gap:8px;margin-bottom:6px;
}
.pulse{
  width:6px;height:6px;border-radius:50%;background:var(--acc);
  animation:pulse 1.2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.2;transform:scale(0.5);}}
.hd-title{
  font-family:'Oswald',sans-serif;font-weight:700;
  font-size:clamp(3.5rem,7vw,8rem);letter-spacing:0.05em;
  line-height:1.05;color:var(--ink);
}
.hd-sub{
  font-family:'IBM Plex Mono',monospace;font-weight:300;
  font-size:clamp(1rem,1.5vw,1.5rem);letter-spacing:0.28em;
  color:rgba(10,10,10,0.35);margin-top:5px;
}

.hd-right{
  display:flex;flex-direction:column;align-items:flex-end;justify-content:center;
  padding: clamp(16px,2.8vh,36px) clamp(28px,4vw,64px);
  gap:6px;min-width:280px;
}
.date-chip{
  font-family:'IBM Plex Mono',monospace;font-weight:600;
  font-size:clamp(1.3rem,2.2vw,2.2rem);letter-spacing:0.1em;
  background:var(--acc);color:#fff;
  padding:14px 36px 14px 24px;
  clip-path:polygon(0 0,100% 0,calc(100% - 10px) 100%,0 100%);
}
.date-sub{
  font-family:'IBM Plex Mono',monospace;font-weight:300;
  font-size:clamp(0.85rem,1.2vw,1.2rem);letter-spacing:0.18em;
  color:rgba(10,10,10,0.38);
}

/* ══ COUNTDOWN GRID ══ */
.cd{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:1fr;
  opacity:0;animation:fadeY 0.6s ease forwards 0.15s;
}

.cb{
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:center;
  padding: 0 clamp(16px,2.5vw,44px);
  border-right:1px solid var(--rule);
  
  transition:background 0.3s;
}
.cb:last-child{border-right:none;}



/* large ghost index number — top-right corner */
.cb-index{
  position:absolute;top:clamp(6px,1vh,12px);right:clamp(10px,1.5vw,20px);
  font-family:'IBM Plex Mono',monospace;font-weight:300;
  font-size:clamp(0.55rem,0.8vw,0.78rem);letter-spacing:0.15em;
  color:rgba(10,10,10,0.18);
}

/* accent corner tick */
.cb::before{
  content:'';position:absolute;top:0;left:0;
  width:clamp(30px,4vw,56px);height:3px;
  background:var(--acc);
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.3s ease;
}
.cb:hover::before{transform:scaleX(1);}

/* THE NUMBER */
.cb-num{
  font-family:'Oswald',sans-serif;font-weight:700;
  font-size:clamp(4rem,22vh,28vh);
  line-height:0.88;letter-spacing:-0.02em;
  color:var(--ink);
  transition:color 0.12s;
  will-change:transform;
}
.cb:hover .cb-num{color:var(--acc);}

/* label row */
.cb-foot{
  display:flex;align-items:center;gap:10px;
  margin-top:clamp(4px,0.8vh,10px);
}
.cb-label{
  font-family:'IBM Plex Mono',monospace;font-weight:600;
  font-size:clamp(1rem,1.6vw,1.6rem);letter-spacing:0.18em;
  color:#fff;background:var(--ink);
  padding:3px 12px 3px 8px;text-transform:uppercase;
  clip-path:polygon(0 0,100% 0,calc(100% - 8px) 100%,0 100%);
}
.cb-label-ja{
  font-family:'Noto Sans JP',sans-serif;font-weight:300;
  font-size:clamp(1rem,1.5vw,1.5rem);letter-spacing:0.1em;
  color:rgba(10,10,10,0.4);
}

/* SECONDS block — accent inverted */
.cb.sec{background:var(--ink);}
.cb.sec .cb-num{color:var(--w);}
.cb.sec:hover .cb-num{color:var(--acc2);}
.cb.sec .cb-index{color:rgba(250,250,248,0.2);}
.cb.sec .cb-label{background:var(--acc);color:#fff;}
.cb.sec .cb-label-ja{color:rgba(250,250,248,0.4);}
.cb.sec::before{background:var(--acc2);}
/* rule lines inside dark block */
.cb.sec{ border-color:rgba(250,250,248,0.1); }

/* flash */
.flash{animation:flashAcc 0.28s ease-out;}
@keyframes flashAcc{
  0%{color:var(--acc);}
  100%{color:var(--ink);}
}
.cb.sec .flash{animation:flashAccInv 0.28s ease-out;}
@keyframes flashAccInv{
  0%{color:var(--acc2);}
  100%{color:var(--w);}
}

/* ══ FOOTER ══ */
.ft{
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--rule);
  padding:clamp(14px,2.2vh,28px) clamp(28px,4vw,64px);
  opacity:0;animation:fadeY 0.5s ease forwards 0.35s;
}
.ft-left{display:flex;align-items:center;gap:14px;}
.ft-logo{height:44px;width:auto;opacity:0.7;}
.ft-name{
  font-family:'IBM Plex Mono',monospace;font-weight:300;
  font-size:clamp(0.85rem,1.2vw,1.2rem);letter-spacing:0.18em;
  color:rgba(10,10,10,0.38);text-transform:uppercase;
}
.ft-msg{
  font-family:'Noto Sans JP',sans-serif;font-weight:100;
  font-size:clamp(1.1rem,1.8vw,1.8rem);letter-spacing:0.26em;
  color:var(--acc);
}
.ft-clock{
  font-family:'IBM Plex Mono',monospace;font-weight:400;
  font-size:clamp(1.2rem,2vw,2rem);letter-spacing:0.12em;color:var(--ink);
}

.celebration{
  display:none;font-family:'Oswald',sans-serif;font-weight:700;
  font-size:clamp(2rem,6vw,6rem);letter-spacing:0.1em;
  color:var(--acc);text-align:center;padding:20px;
}

@keyframes fadeY{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-vignette"></div>

<div class="shell">

  <!-- HEADER -->
  <header class="hd">
    <div class="hd-left">
      <div class="hd-eyebrow"><span class="pulse"></span>NATIONAL EXAMINATION COUNTDOWN</div>
      <div class="hd-title">柔道整復師<br>国家試験</div>
      <div class="hd-sub">第35回&ensp;柔道整復師&ensp;国家試験</div>
    </div>
    <div class="hd-right">
      <div class="date-chip">2027年&ensp;3月&ensp;7日（日）</div>
      <div class="date-sub">試験日（仮）</div>
    </div>
  </header>

  <!-- COUNTDOWN -->
  <div class="cd" id="countdown">
    <div class="cb">
      <span class="cb-index">01</span>
      <span class="cb-num" id="days">000</span>
      <div class="cb-foot">
        <span class="cb-label">DAYS</span>
        <span class="cb-label-ja">日</span>
      </div>
    </div>
    <div class="cb">
      <span class="cb-index">02</span>
      <span class="cb-num" id="hours">00</span>
      <div class="cb-foot">
        <span class="cb-label">HOURS</span>
        <span class="cb-label-ja">時間</span>
      </div>
    </div>
    <div class="cb">
      <span class="cb-index">03</span>
      <span class="cb-num" id="minutes">00</span>
      <div class="cb-foot">
        <span class="cb-label">MINUTES</span>
        <span class="cb-label-ja">分</span>
      </div>
    </div>
    <div class="cb sec">
      <span class="cb-index">04</span>
      <span class="cb-num" id="seconds">00</span>
      <div class="cb-foot">
        <span class="cb-label">SECONDS</span>
        <span class="cb-label-ja">秒</span>
      </div>
    </div>
  </div>

  <div class="celebration" id="celebration">試験当日 — これまでの努力を信じて</div>

  <!-- FOOTER -->
  <footer class="ft">
    <div class="ft-left">
      <img src="https://page.gensparksite.com/v1/base64_upload/49a84d050fca839f6863a744eccb25f2" class="ft-logo" alt="">
      <span class="ft-name">Judo Therapy</span>
    </div>
    <div class="ft-msg" id="message">目標達成まで　一歩ずつ前進しましょう</div>
    <div class="ft-clock" id="live-clock">--:--:--</div>
  </footer>

</div>

<script>
const examDate=new Date('2027-03-07T09:00:00').getTime();
const pad=(n,l=2)=>String(n).padStart(l,'0');
let prev={};
function flash(id){
  const el=document.getElementById(id);
  el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');
}
function tick(){
  const now=new Date();
  document.getElementById('live-clock').textContent=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const dist=examDate-now.getTime();
  const dd=Math.max(0,Math.floor(dist/86400000));
  const hh=Math.max(0,Math.floor((dist%86400000)/3600000));
  const mm=Math.max(0,Math.floor((dist%3600000)/60000));
  const ss=Math.max(0,Math.floor((dist%60000)/1000));
  const vals={days:pad(dd,3),hours:pad(hh),minutes:pad(mm),seconds:pad(ss)};
  for(const k in vals){
    if(prev[k]!==vals[k]){if(prev[k]!==undefined)flash(k);document.getElementById(k).textContent=vals[k];prev[k]=vals[k];}
  }
  const msg=document.getElementById('message');
  if(dist<0){document.getElementById('countdown').style.display='none';document.getElementById('celebration').style.display='block';msg.style.display='none';}
  else if(dd===0)msg.textContent='試験当日です　— 落ち着いて全力を尽くしてください —';
  else if(dd<=7) msg.textContent='最終調整の時期です　— 体調管理を最優先に —';
  else if(dd<=30)msg.textContent='仕上げの段階です　— 重要ポイントを丁寧に確認を —';
  else if(dd<=100)msg.textContent='本格的な対策期間です　— 計画的に学習を進めましょう —';
  else msg.textContent='目標達成まで　一歩ずつ前進しましょう';
}
tick();setInterval(tick,1000);
document.addEventListener('click',()=>document.documentElement.requestFullscreen?.().catch(()=>{}),{once:true});
document.addEventListener('keydown',e=>{if(e.key==='F11'){e.preventDefault();document.fullscreenElement?document.exitFullscreen?.():document.documentElement.requestFullscreen?.();}});
document.addEventListener('visibilitychange',()=>{if(!document.hidden)tick();});
</script>
</body>
</html>
