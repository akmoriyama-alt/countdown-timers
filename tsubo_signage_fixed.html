<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>経穴サイネージ — 日本伊泉</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=IBM+Plex+Mono:wght@300;400;600&family=Noto+Sans+JP:wght@100;300;400&display=swap" rel="stylesheet">
<style>
:root{--w:#FAFAF8;--ink:#0A0A0A;--acc:#1A55A0;--acc2:#2870CC;--grid:rgba(10,10,10,0.06);--rule:rgba(10,10,10,0.14);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--w);color:var(--ink);}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:60px 60px;}
.bg-vignette{position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse 80% 70% at 50% 50%,rgba(250,250,248,0.6) 0%,transparent 100%);}
.shell{position:relative;z-index:2;width:100vw;height:100vh;display:flex;flex-direction:column;}

/* HEADER */
.hd{display:flex;align-items:stretch;justify-content:space-between;
  opacity:0;animation:fadeY 0.5s ease forwards;flex-shrink:0;border-bottom:1px solid var(--rule);}
.hd-left{display:flex;align-items:center;gap:clamp(12px,1.5vw,24px);
  padding:clamp(8px,1.4vh,18px) clamp(16px,2.5vw,40px);flex:1;}
.logo{height:clamp(40px,5vh,60px);width:auto;flex-shrink:0;opacity:0.95;max-width:120px;object-fit:contain;}
.hd-eyebrow{font-family:"IBM Plex Mono",monospace;font-weight:300;
  font-size:clamp(0.7rem,1vw,1rem);letter-spacing:0.22em;color:var(--acc);
  display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.2;transform:scale(0.5);}}
.hd-title{font-family:"Oswald",sans-serif;font-weight:700;
  font-size:clamp(1.6rem,3vw,4rem);letter-spacing:0.05em;line-height:1.05;color:var(--ink);}
.hd-sub{font-family:"IBM Plex Mono",monospace;font-weight:300;
  font-size:clamp(0.65rem,0.9vw,0.95rem);letter-spacing:0.28em;color:rgba(10,10,10,0.32);margin-top:2px;}
.hd-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;
  padding:clamp(10px,1.8vh,24px) clamp(20px,3vw,52px);gap:6px;min-width:240px;
  border-left:1px solid var(--rule);}
.live-clock{font-family:"IBM Plex Mono",monospace;font-weight:600;
  font-size:clamp(1.6rem,2.8vw,3.4rem);letter-spacing:0.1em;color:var(--acc);}
.counter-badge{font-family:"IBM Plex Mono",monospace;font-weight:300;
  font-size:clamp(0.65rem,0.9vw,0.95rem);letter-spacing:0.18em;color:rgba(10,10,10,0.36);}

/* PROGRESS */
.progress-bar-wrap{height:3px;background:var(--rule);flex-shrink:0;}
.progress-bar-fill{height:100%;background:var(--acc);width:0%;transition:width 0s linear;}

/* MAIN */
.content{flex:1;display:flex;overflow:hidden;opacity:0;animation:fadeY 0.6s ease forwards 0.2s;}

/* LEFT – illustration panel */
.illus-panel{
  width:clamp(300px,34vw,480px);flex-shrink:0;
  display:flex;flex-direction:column;
  border-right:1px solid var(--rule);
  background:rgba(26,85,160,0.018);
  overflow:hidden;position:relative;
}

/* Full-panel illustration: body locator top, zoom bottom */
.illus-inner{
  flex:1;display:flex;flex-direction:row;overflow:hidden;
}

/* Body locator - left strip */
.body-locator{
  width:clamp(90px,7vw,120px);flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-right:1px solid var(--rule);
  padding:clamp(8px,1vh,16px) clamp(6px,0.8vw,12px);
  background:rgba(26,85,160,0.012);
}
.locator-label{
  font-family:"IBM Plex Mono",monospace;font-weight:600;
  font-size:clamp(0.55rem,0.75vw,0.78rem);letter-spacing:0.16em;color:var(--acc);
  text-transform:uppercase;text-align:center;margin-top:8px;opacity:0.7;
}

/* Zoom panel - right of locator */
.zoom-panel{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(12px,1.8vh,24px) clamp(12px,1.5vw,20px) clamp(8px,1.2vh,16px);
  gap:clamp(6px,0.8vh,10px);overflow:hidden;
}
.zoom-panel svg{width:100%;flex:1;min-height:0;display:block;}
.zoom-caption{
  font-family:"Noto Sans JP",sans-serif;font-weight:300;
  font-size:clamp(0.65rem,0.9vw,0.92rem);letter-spacing:0.08em;
  color:rgba(10,10,10,0.5);text-align:center;line-height:1.5;
}
.meridian-tag{
  font-family:"IBM Plex Mono",monospace;font-weight:600;
  font-size:clamp(0.6rem,0.82vw,0.86rem);letter-spacing:0.14em;color:var(--acc);
  text-align:center;padding:4px 10px;border:1px solid rgba(26,85,160,0.22);
  border-radius:2px;background:rgba(26,85,160,0.05);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;
}

/* RIGHT – info panel */
.info-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;
  padding:clamp(18px,2.6vh,44px) clamp(22px,3vw,52px);gap:clamp(12px,1.8vh,22px);}
.name-row{display:flex;align-items:baseline;gap:clamp(10px,1.6vw,24px);flex-wrap:wrap;}
.name-ja{font-family:"Noto Sans JP",sans-serif;font-weight:100;
  font-size:clamp(2.8rem,6.5vw,8rem);line-height:0.95;color:var(--ink);letter-spacing:0.04em;}
.name-right{display:flex;flex-direction:column;gap:5px;justify-content:flex-end;padding-bottom:4px;}
.name-en{font-family:"Oswald",sans-serif;font-weight:700;
  font-size:clamp(1.1rem,2.4vw,2.8rem);letter-spacing:0.06em;color:var(--acc);}
.name-kana{font-family:"Noto Sans JP",sans-serif;font-weight:300;
  font-size:clamp(0.8rem,1.2vw,1.3rem);letter-spacing:0.22em;color:rgba(10,10,10,0.38);}
.divider{width:100%;height:1px;background:var(--rule);flex-shrink:0;}
.meta-label{font-family:"IBM Plex Mono",monospace;font-weight:600;
  font-size:clamp(0.62rem,0.85vw,0.9rem);letter-spacing:0.2em;color:var(--acc);
  text-transform:uppercase;margin-bottom:5px;}
.meta-val{font-family:"Noto Sans JP",sans-serif;font-weight:300;
  font-size:clamp(0.85rem,1.3vw,1.42rem);letter-spacing:0.05em;color:var(--ink);line-height:1.55;}
.desc-text{font-family:"Noto Sans JP",sans-serif;font-weight:300;
  font-size:clamp(0.88rem,1.4vw,1.6rem);letter-spacing:0.04em;line-height:1.9;
  color:rgba(10,10,10,0.7);}
.effects{display:flex;flex-wrap:wrap;gap:7px;margin-top:auto;padding-top:clamp(6px,1vh,14px);}
.effect-tag{font-family:"Noto Sans JP",sans-serif;font-weight:300;
  font-size:clamp(0.7rem,0.95vw,1rem);letter-spacing:0.05em;
  background:rgba(26,85,160,0.06);border:1px solid rgba(26,85,160,0.18);
  border-radius:2px;padding:4px 11px;color:rgba(10,10,10,0.6);}

/* FADE */
.card-fade{transition:opacity 0.4s ease;}
.card-fade.out{opacity:0;}
.illus-fade{transition:opacity 0.4s ease;}
.illus-fade.out{opacity:0;}
@keyframes fadeY{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

/* 共通スタイル定数 */
const SK='#B0A898', SK2='#C8C0B4', SKIN='#EDE8E0', SKIN2='#DDD8D2', SKIN3='#CECAC0',
      BONE='#D0C8BC', ACC='#1A55A0', ACC2='#2870CC', ACC_L='rgba(26,85,160,0.12)', INK='rgba(10,10,10,0.72)';

function tsuboMarker(x,y,label,side='above'){
  const textY = side==='below' ? y+28 : y-20;
  const lineY1 = side==='below' ? y+10 : y-10;
  const lineY2 = side==='below' ? y+20 : y-20;
  return `<g>
    <circle cx="${x}" cy="${y}" r="18" fill="${ACC_L}"/>
    <circle cx="${x}" cy="${y}" r="10" fill="${ACC}" opacity="0.9"/>
    <circle cx="${x}" cy="${y}" r="4" fill="#FAFAF8"/>
    <circle cx="${x}" cy="${y}" r="10" fill="none" stroke="${ACC}" stroke-width="2" opacity="0.8">
      <animate attributeName="r" values="10;26" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="${x}" cy="${y}" r="10" fill="none" stroke="${ACC}" stroke-width="1.5" opacity="0.5">
      <animate attributeName="r" values="10;26" dur="2s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <rect x="${x-28}" y="${textY-16}" width="56" height="20" rx="3" fill="${ACC}" opacity="0.92"/>
    <text x="${x}" y="${textY-2}" text-anchor="middle"
      font-family="Noto Sans JP,sans-serif" font-size="13" fill="#FAFAF8" font-weight="400">${label}</text>
  </g>`;
}

function labelLine(x1,y1,x2,y2,txt,anchor='start'){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${SK}" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>

      font-family="Noto Sans JP,sans-serif" font-size="12" fill="${INK}" opacity="0.65">${txt}</text>`;
}

/* ── ズームSVG ディスパッチャ ── */
function buildZoom(d){
  const {x,y}=d.zoomPt, lbl=d.ja;
  switch(d.zoom){
    case 'hand_back':  return zoomHandBack(x,y,lbl);
    case 'hand_palm':  return zoomHandPalm(x,y,lbl);
    case 'forearm':    return zoomForearm(x,y,lbl);
    case 'lower_leg':  return zoomLeg(x,y,lbl);
    case 'foot_top':   return zoomFoot(x,y,lbl);
    case 'head_side':  return zoomHead(x,y,lbl);
    case 'torso_front':return zoomTorso(x,y,lbl);
    case 'back':       return zoomBack(x,y,lbl);
    default:           return zoomTorso(x,y,lbl);
  }
}

/* ── Render ── */
const INTERVAL=18000;
let idx=0,timer=null;

function render(i){
  const d=TSUBO[i];
  const panel=document.getElementById('info-panel');
  const illus=document.getElementById('illus-wrap');
  panel.classList.add('out');
  illus.classList.add('out');

  setTimeout(()=>{
    document.getElementById('t-name-ja').textContent=d.ja;
    document.getElementById('t-name-en').textContent=`${d.en} — ${d.fullEn}`;
    document.getElementById('t-name-kana').textContent=d.kana;
    document.getElementById('t-location').textContent=d.location;
    document.getElementById('t-desc').textContent=d.desc;
    document.getElementById('t-effects').innerHTML=d.effects.map(e=>`<span class="effect-tag">${e}</span>`).join('');
    document.getElementById('counter-badge').textContent=`${i+1} / ${TSUBO.length}`;
    document.getElementById('illus-meridian').textContent=d.meridian;
    document.getElementById('zoom-caption').textContent=d.caption||'';

    // Locator
    document.getElementById('locator-svg-wrap').innerHTML=buildLocator(d.locatorPt.lx,d.locatorPt.ly);

    // Zoom SVG
    const zoomHTML=buildZoom(d);
    const tmp=document.createElement('div');
    tmp.innerHTML=zoomHTML;
    const newSvg=tmp.querySelector('svg');
    const zsvg=document.getElementById('zoom-svg');
    zsvg.setAttribute('viewBox',newSvg.getAttribute('viewBox'));
    zsvg.innerHTML=newSvg.innerHTML;

    panel.classList.remove('out');
    illus.classList.remove('out');

    const bar=document.getElementById('progress-bar');
    bar.style.transition='none';bar.style.width='0%';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      bar.style.transition=`width ${INTERVAL}ms linear`;
      bar.style.width='100%';
    }));
  },380);
}

function next(){idx=(idx+1)%TSUBO.length;render(idx);}
function prev(){idx=(idx-1+TSUBO.length)%TSUBO.length;render(idx);}

idx=Math.floor(Math.random()*TSUBO.length);
render(idx);
timer=setInterval(next,INTERVAL);

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){clearInterval(timer);next();timer=setInterval(next,INTERVAL);}
  if(e.key==='ArrowLeft'){clearInterval(timer);prev();timer=setInterval(next,INTERVAL);}
  if(e.key==='F11'){e.preventDefault();document.fullscreenElement?document.exitFullscreen?.():document.documentElement.requestFullscreen?.();}
});
document.addEventListener('click',()=>document.documentElement.requestFullscreen?.().catch(()=>{}),{once:true});
</script>
